services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hitl
      POSTGRES_PASSWORD: hitl
      POSTGRES_DB: hitl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hitl -d hitl"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m app.database migrate &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
